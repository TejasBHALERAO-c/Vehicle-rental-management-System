<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RideHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            min-height: auto;
        }

        .auth-container {
            width: 90%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
        }

        .auth-box {
            background: white;
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.1);
            width: 100%;
            position: relative;
            z-index: 1;
            animation: scaleIn 0.4s ease-out;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 25px;
            animation: slideDown 0.4s ease-out;
        }

        .auth-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        .auth-form {
            animation: slideUp 0.4s ease-out 0.1s both;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: #667eea;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-group input::placeholder {
            color: #999;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .error-message, .success-message {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease-out;
            display: none;
        }

        .error-message.show {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .success-message.show {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            animation: fadeIn 0.4s ease-out 0.2s both;
        }

        .auth-footer p {
            margin-bottom: 8px;
            color: #666;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: #764ba2;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 0.8rem;
        }

        .password-strength.weak {
            color: #e74c3c;
        }

        .password-strength.medium {
            color: #f39c12;
        }

        .password-strength.strong {
            color: #27ae60;
        }

        /* Animations */
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
                align-items: flex-start;
                padding-top: 40px;
            }
            
            .auth-box {
                padding: 30px 25px;
                border-radius: 14px;
            }
            
            .auth-header h1 {
                font-size: 1.8rem;
            }
            
            .auth-header p {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 10px;
                padding-top: 30px;
            }
            
            .auth-box {
                padding: 25px 20px;
                border-radius: 12px;
            }
            
            .auth-header h1 {
                font-size: 1.6rem;
            }
            
            .form-group input {
                padding: 10px 10px 10px 35px;
            }
            
            .btn-primary {
                padding: 12px;
                font-size: 0.95rem;
            }
        }

        @media (max-height: 700px) {
            .main-content {
                padding: 10px 0;
                align-items: flex-start;
            }
            
            .auth-box {
                margin: 10px 0;
            }
            
            .auth-header {
                margin-bottom: 15px;
            }
            
            .form-group {
                margin-bottom: 12px;
            }
        }

        @media (max-width: 360px) {
            .auth-box {
                padding: 20px 15px;
            }
            
            .auth-header h1 {
                font-size: 1.4rem;
            }
            
            .auth-header p {
                font-size: 0.85rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <h1>RideHub</h1>
                    <p>Create Your Account</p>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="Enter password (min. 6 characters)" required>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registerForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordStrength = document.getElementById('passwordStrength');
            
            // Password strength indicator
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = '';
                let strengthClass = '';
                
                if (password.length === 0) {
                    strength = '';
                } else if (password.length < 6) {
                    strength = 'Weak - at least 6 characters required';
                    strengthClass = 'weak';
                } else if (password.length < 8) {
                    strength = 'Medium';
                    strengthClass = 'medium';
                } else {
                    const hasUpper = /[A-Z]/.test(password);
                    const hasLower = /[a-z]/.test(password);
                    const hasNumbers = /\d/.test(password);
                    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                    
                    const varietyCount = [hasUpper, hasLower, hasNumbers, hasSpecial].filter(Boolean).length;
                    
                    if (varietyCount >= 3) {
                        strength = 'Strong';
                        strengthClass = 'strong';
                    } else {
                        strength = 'Medium';
                        strengthClass = 'medium';
                    }
                }
                
                passwordStrength.textContent = strength;
                passwordStrength.className = 'password-strength ' + strengthClass;
            });
            
            // Real-time password match validation
            confirmPasswordInput.addEventListener('input', function() {
                const password = passwordInput.value;
                const confirmPassword = this.value;
                
                if (confirmPassword && password !== confirmPassword) {
                    this.style.borderColor = '#e74c3c';
                } else {
                    this.style.borderColor = '#667eea';
                }
            });
            
            // Form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Get form data
                const formData = new FormData(this);
                const data = {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    password: formData.get('password'),
                    confirmPassword: formData.get('confirmPassword')
                };
                
                // Basic validation
                if (!data.name || !data.email || !data.password) {
                    showError('Name, email, and password are required');
                    return;
                }
                
                if (data.password !== data.confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }
                
                if (data.password.length < 6) {
                    showError('Password must be at least 6 characters');
                    return;
                }
                
                if (!isValidEmail(data.email)) {
                    showError('Invalid email format');
                    return;
                }
                
                // Simulate form submission (replace with actual API call)
                const button = this.querySelector('.btn-primary');
                button.disabled = true;
                button.textContent = 'Creating Account...';
                
                // Simulate API call delay
                setTimeout(() => {
                    showSuccess('Registration successful! Redirecting to login...');
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }, 1500);
            });
            
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.classList.add('show');
                successMessage.classList.remove('show');
                
                // Auto-hide error after 5 seconds
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 5000);
            }
            
            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.classList.add('show');
                errorMessage.classList.remove('show');
            }
            
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
            
            // Add focus effects
            const inputs = form.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.style.background = 'white';
                });
                
                input.addEventListener('blur', function() {
                    if (!this.value) {
                        this.style.background = '#fafafa';
                    }
                });
            });
        });
    </script>
</body>
</html>
