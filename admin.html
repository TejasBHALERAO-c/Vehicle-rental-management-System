<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Vehicle Rental</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">VehiRent Admin</div>
            <ul class="nav-menu">
                <li><a href="admin.html" class="nav-link active">Dashboard</a></li>
                <li><a href="#" id="logoutBtn" class="nav-link logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="vehicles">Manage Vehicles</button>
            <button class="tab-btn" data-tab="bookings">View Bookings</button>
            <button class="tab-btn" data-tab="users">Manage Users</button>
        </div>

        <div id="vehiclesTab" class="tab-content active">
            <div class="tab-header">
                <h2>Manage Vehicles</h2>
                <button id="addVehicleBtn" class="btn btn-primary">Add New Vehicle</button>
            </div>
            <div id="vehiclesList" class="admin-table-container"></div>
        </div>

        <div id="bookingsTab" class="tab-content">
            <h2>Bookings</h2>
            <div id="bookingsList" class="admin-table-container"></div>
        </div>

        <div id="usersTab" class="tab-content">
            <h2>Users</h2>
            <div id="usersList" class="admin-table-container"></div>
        </div>
    </div>

    <div id="vehicleModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalTitle">Add Vehicle</h2>
            <form id="vehicleForm">
                <div class="form-group">
                    <label for="vehicleName">Vehicle Name</label>
                    <input type="text" id="vehicleName" required>
                </div>
                <div class="form-group">
                    <label for="vehicleCategory">Category</label>
                    <select id="vehicleCategory" required>
                        <option>Bikes</option>
                        <option>Scooters</option>
                        <option>Cars</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="baseFare">Base Fare ($)</label>
                    <input type="number" id="baseFare" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="ratePerKm">Rate Per KM ($)</label>
                    <input type="number" id="ratePerKm" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="availability">
                        <input type="checkbox" id="availability" checked>
                        Available
                    </label>
                </div>
                <div class="form-group">
                    <label for="isPremium">
                        <input type="checkbox" id="isPremium">
                        Premium Vehicle
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Save Vehicle</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/admin.js"></script>
</body>
</html>
